<button onclick="enableSound()">Enable Sound</button>
<select onchange="setLang(this.value)">
  <option value="en">English</option>
  <option value="as">Assamese</option>
</select>
<div class="card">
<script src="firebase.js"></script>
<script src="app.js"></script>
<h3>Select Category</h3>

<select id="category" onchange="loadServices()">
  <option value="">Select</option>
  <option>Online Apply</option>
  <option>Recharge</option>
  <option>Print</option>
</select>

<select id="service" onchange="loadSubService()"></select>

<select id="subService" onchange="handleService()"></select>

  <select id="subService" onchange="calculateBill()"></select>
</div>
<div id="uploadBox" style="display:none;">
  <h4>Upload Documents</h4>
  <input type="file" id="doc1">
  <input type="file" id="doc2">
</div>
<select id="service" onchange="handleServiceChange()">
  <option value="">Select Service</option>
  <option>Electricity Bill</option>
  <option>Print B/W</option>
  <option>Print Color</option>
  <option>PAN Card Apply</option>
</select>
<div id="ebillBox" style="display:none;">
  <h4>Select Bill Amount</h4>

  <select id="ebillAmount" onchange="calculateBill()">
    <option value="100">₹100</option>
    <option value="200">₹200</option>
    <option value="300">₹300</option>
    <option value="400">₹400</option>
    <option value="500">₹500</option>
  </select>
</div>
